# Global Nginx configuration for host Nginx.
# Install path on server: /etc/nginx/nginx.conf
# Site vhosts are loaded from: /etc/nginx/sites-enabled/*

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 10240;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Large uploads for media library and backup restore.
    client_max_body_size 500m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip.
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # Proxy defaults.
    proxy_buffering on;
    proxy_buffers 16 16k;
    proxy_buffer_size 32k;
    proxy_connect_timeout 60s;
    proxy_send_timeout 1800s;
    proxy_read_timeout 1800s;

    # WebSocket / upgrade support.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Upstreams exposed by docker-compose on the host.
    # Production defaults:
    #   frontend -> 127.0.0.1:3000
    #   backend  -> 127.0.0.1:8080
    # If you run the dev override, change these to 3001 and 18080.
    upstream vibocnc_frontend {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    upstream vibocnc_backend {
        server 127.0.0.1:8080;
        keepalive 32;
    }

    # SSL defaults.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Rate limiting zones used by site configs.
    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=120r/m;

    # Load per-site configs.
    include /etc/nginx/sites-enabled/*;
}
